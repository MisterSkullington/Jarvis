# Mosquitto config for Jarvis (Eclipse Mosquitto 2.x)
# Bind to all interfaces so PC and server can connect.
listener 1883
protocol mqtt

listener 9001
protocol websockets

# Persistence
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

# Optional: enable auth by creating password_file and uncommenting.
# allow_anonymous false
# password_file /mosquitto/config/passwd

allow_anonymous true
