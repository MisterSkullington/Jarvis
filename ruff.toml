# Ruff linter/formatter configuration for Jarvis
# https://docs.astral.sh/ruff/

target-version = "py310"
line-length = 120

[lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort
    "UP",    # pyupgrade
    "B",     # flake8-bugbear
    "SIM",   # flake8-simplify
    "RUF",   # ruff-specific rules
]
ignore = [
    "E501",  # line too long — handled by formatter
    "B008",  # do not perform function call in argument defaults (FastAPI Depends)
    "RUF012", # mutable class variable annotations
]

[lint.isort]
known-first-party = ["jarvis_core", "services"]
